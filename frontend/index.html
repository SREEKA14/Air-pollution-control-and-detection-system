<!DOCTYPE html>
<html>
<head>
  <title>AI Drone Pollution Control</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Gauge.js -->
  <script src="https://cdn.jsdelivr.net/npm/gaugeJS/dist/gauge.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: black; font-family: Arial; }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      z-index: 1;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 10px;
      width: 300px;
    }

    button {
      padding: 8px 15px;
      background: cyan;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      width: 100%;
    }

    input { width: 100%; }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>

<div id="ui">

  <!-- ALERT -->
  <div id="alertBox"
       style="display:none;
              background:red;
              color:white;
              padding:10px;
              margin-bottom:10px;
              font-weight:bold;
              text-align:center;
              border-radius:5px;
              animation: blink 1s infinite;">
    🚨 CRITICAL AIR QUALITY ALERT 🚨
  </div>

  <!-- SLIDERS -->
  <div>
    PM2.5: <input type="range" id="pm25" min="10" max="300" value="120"><br>
    PM10: <input type="range" id="pm10" min="10" max="300" value="180"><br>
    CO: <input type="range" id="co" min="0" max="5" step="0.1" value="1.5"><br>
    NO2: <input type="range" id="no2" min="10" max="200" value="80"><br>
    SO2: <input type="range" id="so2" min="10" max="200" value="40"><br>
  </div>

  <button onclick="detectPollution()">Manual Detect</button>
  <button onclick="generateReport()">Download Report</button>

  <div id="status" style="margin-top:10px;">Status: Waiting...</div>
  <div id="aqiDisplay" style="font-size:18px; margin-top:10px;"></div>
  <div id="values" style="margin-top:10px; font-size:13px;"></div>

  <!-- AQI GAUGE -->
  <h4 style="margin-top:15px;">AQI Gauge</h4>
  <canvas id="aqiGauge" width="250" height="150"></canvas>

  <!-- PM2.5 TREND -->
  <h4 style="margin-top:15px;">Live PM2.5 Trend</h4>
  <canvas id="pollutionChart" width="250" height="150"></canvas>

</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 15, 35);
camera.lookAt(0,0,0);

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({ color: 0x222222 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Buildings
for (let i=0;i<30;i++){
  let h = Math.random()*6+2;
  let building = new THREE.Mesh(
    new THREE.BoxGeometry(2,h,2),
    new THREE.MeshStandardMaterial({ color: 0x444444 })
  );
  building.position.x = (Math.random()-0.5)*50;
  building.position.z = (Math.random()-0.5)*50;
  building.position.y = h/2;
  scene.add(building);
}

// Smoke
let smoke = new THREE.Mesh(
  new THREE.SphereGeometry(5,32,32),
  new THREE.MeshStandardMaterial({
    color: 0x555555,
    transparent: true,
    opacity: 0.7
  })
);
smoke.position.set(0,5,0);
scene.add(smoke);

// ================= DRONE =================

let drone;
let loader = new THREE.GLTFLoader();

loader.load('drone.glb', function(gltf){
  drone = gltf.scene;

  let box = new THREE.Box3().setFromObject(drone);
  let center = box.getCenter(new THREE.Vector3());
  let size = box.getSize(new THREE.Vector3());

  drone.position.sub(center);

  let maxDim = Math.max(size.x,size.y,size.z);
  let scale = 8/maxDim;
  drone.scale.set(scale,scale,scale);

  drone.position.set(-15,15,0);
  scene.add(drone);
});

// ================= SPRAY =================

let sprayParticles = [];

function startSpray(){
  for(let i=0;i<200;i++){
    let particle = new THREE.Mesh(
      new THREE.SphereGeometry(0.15,6,6),
      new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    particle.position.set(
      drone.position.x + (Math.random()-0.5),
      drone.position.y - 2,
      drone.position.z + (Math.random()-0.5)
    );
    scene.add(particle);
    sprayParticles.push(particle);
  }
}

function animateSpray(){
  sprayParticles.forEach(p=>{ p.position.y -= 0.3; });
}

function reduceSmoke(){
  let interval = setInterval(()=>{
    smoke.scale.multiplyScalar(0.95);
    smoke.material.opacity -= 0.03;
    if(smoke.material.opacity <= 0.1){
      clearInterval(interval);
      regenerateSmoke();
    }
  },100);
}

function regenerateSmoke(){
  setTimeout(()=>{
    smoke.scale.set(1,1,1);
    smoke.material.opacity = 0.7;
  },4000);
}

function moveDrone(){
  if(!drone) return;
  let target = new THREE.Vector3(0,12,0);
  drone.position.lerp(target, 0.02);
}

function animate(){
  requestAnimationFrame(animate);
  if(drone){ drone.rotation.y += 0.01; }
  moveDrone();
  animateSpray();
  renderer.render(scene,camera);
}
animate();

// ================= DASHBOARD =================

// PM2.5 Line Chart
let ctx = document.getElementById('pollutionChart').getContext('2d');
let pollutionChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'PM2.5',
      data: [],
      borderColor: 'cyan',
      borderWidth: 2,
      tension: 0.3
    }]
  },
  options: {
    responsive: false,
    scales: { y: { beginAtZero: true, max: 300 } }
  }
});

// AQI Gauge
let gaugeCanvas = document.getElementById("aqiGauge");

let gaugeOptions = {
  angle: 0,
  lineWidth: 0.3,
  pointer: {
    length: 0.6,
    strokeWidth: 0.035,
    color: '#ffffff'
  },
  staticZones: [
    {strokeStyle: "#00ff00", min: 0, max: 100},
    {strokeStyle: "#ffff00", min: 100, max: 200},
    {strokeStyle: "#ff0000", min: 200, max: 300}
  ]
};

let aqiGauge = new Gauge(gaugeCanvas).setOptions(gaugeOptions);
aqiGauge.maxValue = 300;
aqiGauge.setMinValue(0);
aqiGauge.animationSpeed = 32;
aqiGauge.set(50);

// ================= DETECT =================

function detectPollution(){

  let pm25 = parseFloat(document.getElementById("pm25").value);
  let pm10 = parseFloat(document.getElementById("pm10").value);
  let co = parseFloat(document.getElementById("co").value);
  let no2 = parseFloat(document.getElementById("no2").value);
  let so2 = parseFloat(document.getElementById("so2").value);

  document.getElementById("values").innerHTML =
    "PM2.5: "+pm25+" | PM10: "+pm10+
    " | CO: "+co+" | NO2: "+no2+
    " | SO2: "+so2;

  document.getElementById("status").innerText="Detecting...";

  fetch('http://127.0.0.1:5000/predict',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pm25,pm10,co,no2,so2})
  })
  .then(res=>res.json())
  .then(data=>{

    document.getElementById("status").innerText =
      "Pollution Level: "+data.pollution_level;

    document.getElementById("aqiDisplay").innerText =
      "AI Decision: "+data.pollution_level;

    if(data.pollution_level==="HIGH"){
      document.getElementById("alertBox").style.display="block";
      document.getElementById("alertSound").play();
      smoke.material.color.set(0xff0000);
      startSpray();
      reduceSmoke();
    }
    else if(data.pollution_level==="MODERATE"){
      document.getElementById("alertBox").style.display="none";
      smoke.material.color.set(0xffff00);
    }
    else{
      document.getElementById("alertBox").style.display="none";
      smoke.material.color.set(0x00ff00);
    }

    // Update Graph
    pollutionChart.data.labels.push(new Date().toLocaleTimeString());
    pollutionChart.data.datasets[0].data.push(pm25);

    if(pollutionChart.data.labels.length > 10){
      pollutionChart.data.labels.shift();
      pollutionChart.data.datasets[0].data.shift();
    }

    pollutionChart.update();

    // Update Gauge
    aqiGauge.set(pm25);

  });

}

setInterval(detectPollution, 6000);

// ================= REPORT =================

function generateReport(){

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let pm25 = parseFloat(document.getElementById("pm25").value);
  let pm10 = parseFloat(document.getElementById("pm10").value);
  let co = parseFloat(document.getElementById("co").value);
  let no2 = parseFloat(document.getElementById("no2").value);
  let so2 = parseFloat(document.getElementById("so2").value);

  // Mist Calculation
  let mistAmount =
    (pm25 * 0.5) +
    (pm10 * 0.3) +
    (co * 20) +
    (no2 * 0.2) +
    (so2 * 0.2);

  mistAmount = mistAmount.toFixed(2);

  let water = (mistAmount * 0.70).toFixed(2);
  let neutralizer = (mistAmount * 0.15).toFixed(2);
  let oxidizer = (mistAmount * 0.10).toFixed(2);
  let additives = (mistAmount * 0.05).toFixed(2);

  // PDF CONTENT
  doc.setFontSize(16);
  doc.text("AI Drone Pollution Control Report", 20, 20);

  doc.setFontSize(12);
  doc.text("Pollution Levels:", 20, 40);
  doc.text(`PM2.5: ${pm25}`, 20, 50);
  doc.text(`PM10: ${pm10}`, 20, 60);
  doc.text(`CO: ${co}`, 20, 70);
  doc.text(`NO2: ${no2}`, 20, 80);
  doc.text(`SO2: ${so2}`, 20, 90);

  doc.text("Recommended Mist Spray:", 20, 110);
  doc.text(`Total Mist Required: ${mistAmount} ml`, 20, 120);

  doc.text("Mist Composition:", 20, 140);
  doc.text(`Water (H2O): ${water} ml`, 20, 150);
  doc.text(`Neutralizer: ${neutralizer} ml`, 20, 160);
  doc.text(`Oxidizer: ${oxidizer} ml`, 20, 170);
  doc.text(`Additives: ${additives} ml`, 20, 180);

  doc.text("Conclusion:", 20, 200);
  doc.text("AI optimized mist composition for pollution control.", 20, 210);

  doc.save("Pollution_Report.pdf");
}

</script>

</body>
</html>
